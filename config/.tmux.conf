# ~/.tmux.conf — headless server defaults
# Deployed by server-setup.sh / push-server.sh

###################################################################################################
#                                            PREFIX                                               #
###################################################################################################

# C-a feels more natural on servers (screen-compatible)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

###################################################################################################
#                                           GENERAL                                               #
###################################################################################################

set -g history-limit 50000
set -g display-time 4000          # status messages stay visible 4s
set -g focus-events on
set -sg escape-time 10            # no delay after Esc (important for vim)
set -g base-index 1               # windows start at 1, not 0
set -g pane-base-index 1
set -g renumber-windows on        # re-number on close
set -g set-clipboard on

###################################################################################################
#                                         MOUSE SUPPORT                                           #
###################################################################################################

set -g mouse on

###################################################################################################
#                                       SPLIT / WINDOW KEYS                                       #
###################################################################################################

# Intuitive splits: | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

###################################################################################################
#                                       PANE NAVIGATION                                           #
###################################################################################################

# vim-style pane switching
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with Shift+arrow
bind -r S-Left  resize-pane -L 5
bind -r S-Right resize-pane -R 5
bind -r S-Down  resize-pane -D 5
bind -r S-Up    resize-pane -U 5

###################################################################################################
#                                        COPY MODE (vi)                                           #
###################################################################################################

set -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi y   send -X copy-selection-and-cancel

###################################################################################################
#                                         STATUS BAR                                             #
###################################################################################################

set -g status on
set -g status-interval 15
set -g status-position bottom

# Colors — dark, readable on headless terminals
set -g status-style                 "bg=colour235,fg=colour250"
set -g window-status-style          "bg=colour235,fg=colour244"
set -g window-status-current-style  "bg=colour24,fg=colour255,bold"
set -g pane-border-style            "fg=colour238"
set -g pane-active-border-style     "fg=colour24"
set -g message-style                "bg=colour24,fg=colour255"

# Left: session name
set -g status-left-length 30
set -g status-left " #[bold]#S#[nobold] "

# Right: hostname + time
set -g status-right-length 60
set -g status-right "#[fg=colour244]#H  #[fg=colour250]%Y-%m-%d %H:%M "

# Window list format
set -g window-status-format         " #I:#W "
set -g window-status-current-format " #I:#W "
